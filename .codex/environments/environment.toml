# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "plant-care-app"

[setup]
script = '''
$ErrorActionPreference = "Stop"

Write-Host "========================================"
Write-Host "Codex Worktree Setup"
Write-Host "========================================"
Write-Host "Working directory:" (Get-Location)
Write-Host ""

# -----------------------------
# Tool/version checks
# -----------------------------

Write-Host "Tool versions:"
node -v
npm -v
git --version
gh --version
Write-Host ""

# -----------------------------
# Git freshness gate
# -----------------------------

Write-Host "Git remote:"
git remote -v
Write-Host ""

Write-Host "Fetching latest Git refs..."
git fetch --all --prune

if ($LASTEXITCODE -ne 0) {
  throw "Git fetch failed. Cannot verify worktree freshness."
}

$head = (git rev-parse HEAD).Trim()

if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($head)) {
  throw "Unable to determine current HEAD."
}

Write-Host "Current HEAD: $head"
Write-Host ""

# Find local branches whose tip exactly equals HEAD.
$matchingLocalBranches = @(
  git for-each-ref refs/heads --format='%(refname:short) %(objectname)' |
    ForEach-Object {
      $parts = $_ -split '\s+'
      if ($parts.Length -ge 2 -and $parts[1] -eq $head) {
        $parts[0]
      }
    }
)

# Find remote branches whose tip exactly equals HEAD.
$matchingRemoteBranches = @(
  git for-each-ref refs/remotes --format='%(refname:short) %(objectname)' |
    Where-Object { -not $_.StartsWith("origin/HEAD ") } |
    ForEach-Object {
      $parts = $_ -split '\s+'
      if ($parts.Length -ge 2 -and $parts[1] -eq $head) {
        $parts[0]
      }
    }
)

Write-Host "Matching local branch tips:"
if ($matchingLocalBranches.Count -gt 0) {
  $matchingLocalBranches | ForEach-Object { Write-Host " - $_" }
} else {
  Write-Host " - none"
}

Write-Host "Matching remote branch tips:"
if ($matchingRemoteBranches.Count -gt 0) {
  $matchingRemoteBranches | ForEach-Object { Write-Host " - $_" }
} else {
  Write-Host " - none"
}

Write-Host ""

if ($matchingLocalBranches.Count -eq 0 -and $matchingRemoteBranches.Count -eq 0) {
  Write-Host "Current worktree recent commits:"
  git log --oneline --decorate -5

  Write-Host ""
  Write-Host "Recent remote branch tips:"
  git for-each-ref refs/remotes --sort=-committerdate --format='%(refname:short) %(objectname:short) %(committerdate:relative)' | Select-Object -First 15

  throw "Stopping setup: this Codex worktree HEAD is not the current tip of any known local or remote branch after fetch. It is likely stale or based on an old detached commit."
}

function Test-GitRefExists {
  param (
    [Parameter(Mandatory = $true)]
    [string] $RefName
  )

  git rev-parse --verify --quiet $RefName *> $null
  return $LASTEXITCODE -eq 0
}

function Get-UpstreamForBranch {
  param (
    [Parameter(Mandatory = $true)]
    [string] $BranchName
  )

  $upstream = git rev-parse --abbrev-ref "$BranchName@{upstream}" 2>$null

  if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($upstream)) {
    return $upstream.Trim()
  }

  $sameNameOriginBranch = "origin/$BranchName"

  if (Test-GitRefExists $sameNameOriginBranch) {
    return $sameNameOriginBranch
  }

  return $null
}

function Get-AheadBehind {
  param (
    [Parameter(Mandatory = $true)]
    [string] $LeftRef,

    [Parameter(Mandatory = $true)]
    [string] $RightRef
  )

  $counts = git rev-list --left-right --count "$LeftRef...$RightRef"

  if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($counts)) {
    throw "Unable to compare '$LeftRef' with '$RightRef'."
  }

  $parts = $counts.Trim() -split '\s+'

  return @{
    Ahead = [int]$parts[0]
    Behind = [int]$parts[1]
  }
}

# If HEAD matches local branches, make sure those branches are not behind/diverged from upstream.
foreach ($branch in $matchingLocalBranches) {
  $upstream = Get-UpstreamForBranch $branch

  if ($null -eq $upstream) {
    Write-Host "Local branch '$branch' has no upstream or same-name origin branch. Treating it as local-only and fresh by local Git state."
    continue
  }

  Write-Host "Checking freshness for local branch '$branch' against '$upstream'..."

  $comparison = Get-AheadBehind $branch $upstream

  Write-Host " - ahead:  $($comparison.Ahead)"
  Write-Host " - behind: $($comparison.Behind)"

  if ($comparison.Behind -gt 0) {
    if ($comparison.Ahead -gt 0) {
      throw "Stopping setup: local branch '$branch' has diverged from '$upstream'. Sync or resolve the branch before starting Codex."
    } else {
      throw "Stopping setup: local branch '$branch' is behind '$upstream'. Pull/sync the branch before starting Codex."
    }
  }
}

Write-Host ""
Write-Host "Git freshness validation passed."
Write-Host ""

# -----------------------------
# Basic repo-root sanity check
# -----------------------------

if (-not (Test-Path "package.json")) {
  throw "package.json not found. This setup script must run from the project root."
}

Write-Host "Repo root validation passed."
Write-Host ""

# -----------------------------
# .env.local copy + validation
# -----------------------------

$sourceEnv = "C:\Code\plant-care-app\.env.local"
$targetEnv = Join-Path (Get-Location) ".env.local"

Write-Host "Source env path:" $sourceEnv
Write-Host "Target env path:" $targetEnv

if (-not (Test-Path $targetEnv)) {
  Write-Host ".env.local not found in worktree. Attempting copy from source repo..."

  if (-not (Test-Path $sourceEnv)) {
    throw ".env.local missing in worktree and source repo: $sourceEnv"
  }

  Copy-Item $sourceEnv $targetEnv -Force -ErrorAction Stop
  Write-Host ".env.local copied into worktree."
} else {
  Write-Host ".env.local already exists in worktree."
}

if (-not (Test-Path $targetEnv)) {
  throw ".env.local still missing after copy attempt: $targetEnv"
}

if (-not (Select-String -Path $targetEnv -Pattern '^NEXT_PUBLIC_SUPABASE_URL=' -Quiet)) {
  throw "NEXT_PUBLIC_SUPABASE_URL missing from .env.local"
}

if (-not (Select-String -Path $targetEnv -Pattern '^NEXT_PUBLIC_SUPABASE_ANON_KEY=' -Quiet)) {
  throw "NEXT_PUBLIC_SUPABASE_ANON_KEY missing from .env.local"
}

Write-Host ".env.local validation passed."
Write-Host ""

# -----------------------------
# Dependency setup
# -----------------------------

Write-Host "Installing dependencies..."
npm install

if ($LASTEXITCODE -ne 0) {
  throw "npm install failed."
}

Write-Host ""
Write-Host "========================================"
Write-Host "Codex environment setup complete."
Write-Host "========================================"
'''

[cleanup]
script = '''
Write-Host "Running Codex cleanup script from:" (Get-Location)

$pathsToRemove = @(
  ".next",
  "node_modules",
  "coverage",
  "playwright-report",
  "test-results",
  ".vercel",
  ".turbo"
)

foreach ($path in $pathsToRemove) {
  if (Test-Path $path) {
    Write-Host "Removing disposable path: $path"
    Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue
  } else {
    Write-Host "Not present, skipping: $path"
  }
}

Write-Host "Codex cleanup complete."
'''
